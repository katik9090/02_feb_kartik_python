{% extends 'productapp/base.html' %}

{% block title %}Delete Product - Nexus{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; text-align: center;">
    <div class="glass-card">
        <div style="background: rgba(239, 68, 68, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--danger);">
            <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        
        <h2 style="margin-top: 0;">Are you sure?</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">
            You are about to delete <strong>"{{ product.name }}"</strong>. This action cannot be undone.
        </p>
        
        <form method="POST">
            {% csrf_token %}
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-danger" style="flex: 1; justify-content: center;">
                    Yes, Delete
                </button>
                <a href="{% url 'product_list' %}" class="btn" style="background: rgba(255,255,255,0.05); color: var(--text-muted); flex: 1; justify-content: center;">
                    Keep Product
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
